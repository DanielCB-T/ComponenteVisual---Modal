<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria de componente visual</title>
    <link rel="stylesheet" href="css/componente.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="contenedor pequeno">
        <h1>Iniciar Sesión</h1>
        <p class="subtitulo">Ingresa tus credenciales para acceder a tu cuenta.</p>

        <form id="formularioLogin" novalidate>
            <div class="grupo-campo" id="grupoCorreo">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com">
            </div>

            <div class="grupo-campo" id="grupoContrasena">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" class="boton-primario" id="boton-primario">Ingresar</button>
        </form>
    </div>

    <section class="modal">
        <div class="modal-contenedor">
            <img src="img/tijeras.png" alt="modal-tijeras" class="modal-image">
            <h2 class="modal-titulo">Cita realizada con exito</h2>
            <p class="modal-texto">Hemos guardado tu espacio correctamente. Por favor, intenta llegar 5 minutos antes de tu cita programada. ¡Gracias por tu preferencia!</p>
            <a href="#" class="modal-cerrar">Cerrar</a>
        </div>
    </section>
    <script src="js/componente.js"></script>
</body>
</html>
